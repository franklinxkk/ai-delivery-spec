interface:
  display_name: "AI Delivery Spec"
  version: "5.0.2"
  short_description: "Complete PRD, progressive Product Truth, prototype, coding and acceptance contracts for ToB/ToG delivery."
  default_prompt: >
    Use $ai-delivery-spec. Support lightweight ToC idea clarification and PRDs
    as well as governed ToB/ToG delivery. Triage lifecycle, shape, risk, information,
    and consumer. Build one canonical Product Truth, use generic domain
    discovery when no dedicated pack exists, use resumable Product Truth
    fragments for large projects, and project the Human-First, prototype,
    complete AI Coding PRD, QA, customer, or operations views requested.
    Preserve stable IDs, evidence, change impact, and honest completion state.

inputs:
  artifact_type:
    enum: ["idea", "product_truth", "human_first", "prototype", "acceptance", "change", "coding_agent_handoff", "review"]
  projection:
    enum: ["contract_summary", "human_first", "prototype", "coding_agent", "qa_acceptance", "customer_contract"]
    default: "human_first"
  delivery_tier:
    enum: ["L0", "L1", "L2", "L3"]

outputs:
  required_final_fields:
    - triage
    - lifecycle_stage
    - artifact_scope
    - mode_and_tier
    - triggered_gates
    - updated_artifacts
    - verification
    - completion_state

policy:
  allow_implicit_invocation: true
