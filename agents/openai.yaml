interface:
  display_name: "AI Delivery Spec"
  version: "5.3.2"
  short_description: "Requirement management from intake and clarification through change, traceability, and acceptance."
  default_prompt: >
    Use $ai-delivery-spec as a requirement-management kernel. Silently classify
    delivery shape and assurance, self-check evidence, batch independent facts,
    and clarify direction decisions one at a time with a recommendation. Then
    specify, review and baseline. Follow the user's request language for headings,
    prose, tables, questions and tests unless explicitly overridden. By default
    produce one human-readable PRD with a 30-second summary, task reading map,
    self-contained module slices, and engineering/AI indexes instead of separate
    competing PRDs. Preserve stable requirement
    IDs, bidirectional traceability, change impact, executable acceptance and
    evidence. For brownfield work, complete Stage 0 inventory before rewriting.
    For L3 prototypes, require stable regions and browser acceptance evidence.
    Treat implementation, release and operations as external systems.

inputs:
  artifact_type:
    enum: ["intake", "clarification", "unified_prd", "prototype", "change", "traceability", "acceptance", "review"]
  projection:
    enum: ["unified_prd", "requirement_card", "prototype", "qa_acceptance", "customer_contract", "machine_annex"]
    default: "unified_prd"
  delivery_tier:
    enum: ["L0", "L1", "L2", "L3", "L4"]
  delivery_shape:
    enum: ["auto", "requirement_card", "unified_prd", "governed_truth"]
  assurance_profile:
    enum: ["auto", "bounded", "standard", "high_risk", "safety_critical"]

outputs:
  required_final_fields:
    - intake_decision
    - requirement_stage
    - artifact_scope
    - mode_and_tier
    - triggered_gates
    - updated_artifacts
    - verification
    - completion_state

policy:
  allow_implicit_invocation: true
