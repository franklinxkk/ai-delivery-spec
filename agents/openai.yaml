interface:
  display_name: "AI Delivery Spec"
  version: "5.1.7"
  short_description: "Requirement management from intake and clarification through change, traceability, and acceptance."
  default_prompt: >
    Use $ai-delivery-spec as a requirement-management kernel. Start with intake
    and triage, then clarify, specify, review and baseline the requirement. By
    default produce one human-readable PRD with engineering and AI-coding
    appendices instead of separate competing PRDs. Preserve stable requirement
    IDs, bidirectional traceability, change impact, executable acceptance and
    evidence. Treat implementation, release and operations as external systems,
    not workflows managed by this skill.

inputs:
  artifact_type:
    enum: ["intake", "clarification", "unified_prd", "prototype", "change", "traceability", "acceptance", "review"]
  projection:
    enum: ["unified_prd", "requirement_card", "prototype", "qa_acceptance", "customer_contract", "machine_annex"]
    default: "unified_prd"
  delivery_tier:
    enum: ["L0", "L1", "L2", "L3", "L4"]

outputs:
  required_final_fields:
    - intake_decision
    - requirement_stage
    - artifact_scope
    - mode_and_tier
    - triggered_gates
    - updated_artifacts
    - verification
    - completion_state

policy:
  allow_implicit_invocation: true
