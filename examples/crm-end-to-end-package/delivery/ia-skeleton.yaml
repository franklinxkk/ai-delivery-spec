ia_skeleton:
  version: 1.0
  modules:
    - module_id: M01
      module_name: CRM response center
      primary_roles:
        - cs_agent
        - sales_manager
      views:
        - view_id: M01-V01
          view_name: Lead response workspace
          view_type: page
          entry_path: /crm/response-center
          visible_to:
            - cs_agent
            - sales_manager
          regions:
            - region_id: lead-intake
              name: Lead intake form
            - region_id: response-task
              name: Response task and conversion
          primary_actions:
            - action: Create lead
              data_action: create-lead
            - action: Convert opportunity
              data_action: convert-opportunity
  cross_module_flows:
    - flow: lead to opportunity
      source_view: M01-V01
      target_view: M01-V01
      event: LeadConverted
