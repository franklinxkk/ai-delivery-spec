<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CRM Response Center Prototype</title>
</head>
<body>
  <main data-testid="page-M01-V01" data-visible-role="cs_agent,sales_manager" data-state="ready">
    <section data-testid="region-lead-intake" data-state="draft">
      <label>
        Customer name
        <input data-testid="field-lead-customer-name" data-field="Lead.customerName" value="Acme Logistics">
      </label>
      <label>
        Lead source
        <select data-testid="field-lead-source" data-field="Lead.source">
          <option>phone</option>
          <option>website</option>
        </select>
      </label>
      <button
        data-testid="btn-create-lead"
        data-action="create-lead"
        data-api="/api/crm/leads"
        data-method="POST">
        Create lead
      </button>
    </section>
    <section data-testid="region-response-task" data-state="assigned">
      <button
        data-testid="btn-convert-opportunity"
        data-action="convert-opportunity"
        data-api="/api/crm/opportunities"
        data-method="POST">
        Convert opportunity
      </button>
    </section>
  </main>
</body>
</html>
