schema_version: 5.3.0
routing:
  delivery_shape: auto
  assurance_profile: auto
  expose_routing: false
governance:
  canonical_authoring_surface: unified_prd
  decision_ref: DEC-AUTHORITY-001
  projection_policy: update_in_same_change
  source_conflict_resolution:
    strategy: explicit_decision
    decision_prefix: DEC-CONFLICT
    unresolved_status: blocked_for_affected_scope
context:
  profile: auto
  auto_round_large_input: true
  model_context_tokens: null
  reserved_output_tokens: 4096
  system_overhead_tokens: 4096
  max_stage_references: 1
  max_domain_packs: 1
  max_truth_items: 160
  overflow_strategy: retrieve
  never_truncate_priorities: [P0]
  warn_at_ratio: 0.7
assurance:
  auto_classify: true
  manual_profile: auto
  human_gate_on: [regulated, money, safety, privacy, tenant_isolation, ai_writeback, migration]
execution:
  environment: development
  expected_skill_version: 5.3.3
  dependency_policy: strict
  high_risk_failure: block
  low_risk_failure: human_review
  audit_mode: hash_chain
  max_turns_per_stage: 24
  checkpoint_directory: evidence/execution
learning:
  enabled: false
  default_reuse_scope: project_only
  network: disabled
gate:
  diagnostics: first
  level: auto
evaluation:
  release_profile: exploratory
  minimum_repetitions: 1
  require_comparable_baseline: false
