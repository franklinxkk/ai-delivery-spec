schema_version: 1.0.0
snapshot_date: 2026-07-12
scope: public_repository_and_primary_documentation_review
execution_environment:
  user_interface_label: GPT-5.6 SOL
  attestation: user_reported
  independently_verifiable_from_repository: false
  note: The model label is recorded as displayed by the user's execution environment; repository artifacts cannot independently attest provider-side routing or model identity.
method:
  purpose: Compare documented workflow coverage and composability, not declare an overall winner.
  evidence_rule: A rating requires an inspectable official repository, first-party documentation, or source file.
  popularity_rule: Stars and forks are dated discovery signals only and never change a capability rating.
  missing_evidence_rule: not_evidenced means not found in reviewed sources, not impossible.
  ratings:
    primary: A first-class workflow with explicit artifacts, rules, gates, or dedicated skills.
    supported: Explicitly documented and usable, but not the organizing contract.
    adjacent: Contributes indirectly or expects another artifact/tool to own the result.
    not_evidenced: No sufficiently explicit evidence found in the reviewed primary sources.
dimensions:
  discovery_strategy: 产品发现与策略
  clarification_scope: 需求澄清与范围
  business_model_truth: 业务建模与统一规格
  engineering_handoff: 工程交接与 Coding Agent
  acceptance_traceability: 验收测试与追溯
  change_management: 变更与存量演进
  launch_learn_retire: 上线、运营、学习与退役
  ai_governance_runtime_risk: AI 治理与运行风险
  skill_engineering_maintainability: Skill 工程质量与可维护性
