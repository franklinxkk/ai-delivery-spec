schema_version: 5.0.0
selection_policy: >-
  Public, actively maintained repositories were selected for distinct ToB product
  behaviors and repository shapes. Stars are discovery signals only. Each case
  freezes a code ref and a concise requirement capture; it does not claim that
  the source project endorses this skill or that an issue is current roadmap.
