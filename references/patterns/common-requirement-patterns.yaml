schema_version: 5.1.0
library_id: PATLIB-COMMON-001
patterns:
  - id: PAT-APPROVAL-001
    name: 审批流
    applies_when: 业务对象必须经一个或多个有权角色确认后生效
    required_questions: [审批对象与状态权威是谁, 节点和审批人如何确定, 驳回撤回转交加签如何处理, 超时和重复提交如何处理]
    behavior_contract: [申请前置与快照, 节点顺序和守卫, 审批结果及状态/事件/审计, 通知与待办仅作可见结果]
    exception_contract: [审批人失效, 规则变更中的在途实例, 并发审批, 外部通知失败]
    acceptance_blueprints: [合法审批到终态, 越权审批被拒, 驳回后重提, 重复请求幂等]
    anti_patterns: [只写支持审批, 用按钮可见性代替服务端授权, 不定义在途版本]
  - id: PAT-LIST-001
    name: 列表与检索
    applies_when: 用户需要在数据范围内查找排序筛选和批量处理记录
    required_questions: [默认范围与排序是什么, 筛选字典和组合规则是什么, 总数与分页口径是什么, 批量操作的选择范围是什么]
    behavior_contract: [查询条件和数据范围, 空加载错误无权状态, 排序分页总数, 导出与批量动作权限]
    exception_contract: [条件无效, 数据更新导致翻页漂移, 部分记录无权, 大结果集]
    acceptance_blueprints: [默认查询, 组合筛选, 无权隔离, 跨页批量边界]
    anti_patterns: [写常规列表即可, 不定义默认排序, 前端过滤代替数据权限]
  - id: PAT-FORM-001
    name: 表单创建与编辑
    applies_when: 用户创建或修改一个有业务状态的对象
    required_questions: [字段含义来源和编辑权是什么, 草稿与提交如何区分, 并发覆盖如何处理, 取消是否保留]
    behavior_contract: [字段字典和校验, 默认值来源, 保存/提交状态变化, 乐观锁和幂等]
    exception_contract: [校验失败, 并发冲突, 依赖不可用, 部分保存]
    acceptance_blueprints: [合法创建, 边界值, 越权字段, 重复提交, 并发编辑]
    anti_patterns: [仅贴原型, 让研发决定业务必填, 自动覆盖并发修改]
  - id: PAT-PERMISSION-001
    name: 角色权限与数据范围
    applies_when: 不同角色或组织只能查看或操作部分功能/数据
    required_questions: [功能权和数据权如何组合, 数据范围的组织层级是什么, 字段级限制是什么, 兼任委托离职如何处理]
    behavior_contract: [服务端授权, 查询过滤, 写入守卫, 越权审计, UI 显示仅作体验]
    exception_contract: [角色变更缓存, 跨组织引用, 导出泄露, 聚合小样本泄露]
    acceptance_blueprints: [同角色不同范围, 跨租户拒绝, 字段脱敏, 权限变更生效]
    anti_patterns: [隐藏按钮等于权限, 管理员默认全权, 只验页面不验接口]
  - id: PAT-IMPORT-EXPORT-001
    name: 导入导出
    applies_when: 用户批量输入或提取结构化业务数据
    required_questions: [模板和版本是什么, 校验是全有全无还是部分成功, 数据范围和敏感字段是什么, 大文件如何处理]
    behavior_contract: [模板版本, 字段映射, 预检与执行, 结果文件, 权限水印和审计]
    exception_contract: [重复数据, 部分失败, 中断重试, 文件过期, 公式注入]
    acceptance_blueprints: [合法导入, 错误行定位, 重复幂等, 越权导出, 大文件任务]
    anti_patterns: [只写支持 Excel, 不定义失败策略, 导出绕过页面数据范围]
  - id: PAT-INTEGRATION-001
    name: 外部系统集成
    applies_when: 需求依赖外部主数据、命令、事件或回调
    required_questions: [哪方权威, 字段映射和版本是什么, 鉴权限流是什么, 失败重试对账撤销如何处理]
    behavior_contract: [请求响应/事件语义, 幂等和顺序, 超时重试, 对账补偿, 权威冲突]
    exception_contract: [外部不可用, 重复乱序, 部分成功, 字典漂移, 撤销失败]
    acceptance_blueprints: [成功同步, 超时重试, 重复幂等, 对账修复, 权威冲突]
    anti_patterns: [写对接接口即可, 无数据权威, 重试但不幂等, 无对账责任人]
  - id: PAT-QUANTITY-LINEAGE-001
    name: 数量守恒、批次谱系与部分处置
    applies_when: 库存、批次、计量或业务对象会拆分合并返工退回报废或部分完成
    required_questions: [数量单位精度和权威账是谁, 拆分合并后的谱系和编号是什么, 冻结可用在途如何守恒, 部分成功和冲销由谁确认]
    behavior_contract: [期初变化期末守恒公式, 稳定批次和来源关系, 状态与数量双重守卫, 原流水引用和逆向交易]
    exception_contract: [超量负数, 并发占用, 部分失败, 乱序重复, 历史批次规则变化]
    acceptance_blueprints: [完整处置守恒, 部分处置剩余正确, 重复操作不重复扣减, 冲销反查原流水, 越权放行失败]
    anti_patterns: [只写更新库存, 用页面合计代替权威账, 覆盖原流水, 不定义部分处置]
  - id: PAT-MONEY-SETTLEMENT-001
    name: 金额计量、支付撤销与结算对账
    applies_when: 需求包含金额累计计量支付退款赔付结算冲正或跨系统账务结果
    required_questions: [币种单位精度舍入和金额权威是谁, 业务单支付账和财务账何时生效, 重复部分成功如何处理, 撤销冲正对账和差错由谁关闭]
    behavior_contract: [版本化金额口径, 业务命令幂等和状态守卫, 原交易引用的逆向交易, 多账状态和责任人对账]
    exception_contract: [渠道成功业务失败, 业务成功记账失败, 重复回调, 跨日月结, 超额累计和人工挂账]
    acceptance_blueprints: [正常结算账实一致, 重复请求仅一次业务效果, 部分失败生成唯一差错, 撤销反查原交易, 越权金额决定失败]
    anti_patterns: [用消息exactly-once代替业务幂等, 只显示支付成功, 直接修改历史金额, 无差错责任人]
  - id: PAT-HUMAN-DECISION-001
    name: 高影响自动建议与人工责任决策
    applies_when: 规则模型或AI影响拒绝批准授信赔付医疗安全合规或其他个人权益和不可逆结果
    required_questions: [机器输出是建议还是决定, 有权责任人和复核条件是什么, 理由证据和版本如何保存, 当事人如何异议申诉和人工覆盖]
    behavior_contract: [建议与决定分离, 角色和状态服务端守卫, 输入输出版本和证据, 人工确认覆盖和申诉闭环]
    exception_contract: [低置信度, 模型不可用, 证据冲突, 越权确认, 批量误判和版本切换中的在途对象]
    acceptance_blueprints: [建议不自动生效, 有权人员确认, 越权决定失败, 理由证据可追溯, 异议进入人工流程]
    anti_patterns: [AI判定后直接生效, 人工兜底但无责任人, 只保存最终标签, 无申诉路径]
  - id: PAT-STATUTORY-SERVICE-001
    name: 法定事项、跨组织协同与材料复用
    applies_when: 政务公共服务或受监管事项跨组织受理补正审批送达归档并受法定职责时限约束
    required_questions: [事项地域和依据版本是什么, 各组织法定或约定职责是什么, 时限如何起停恢复, 材料复用的授权用途有效期和回退是什么]
    behavior_contract: [事项版本和职责状态所有者, 补正暂停恢复与送达, 最小数据共享和申请人知情, 决定归档申诉证据]
    exception_contract: [来源不可用, 事项版本变化, 部门拒绝接收, 超时, 撤回, 材料异议和在办实例切换]
    acceptance_blueprints: [正常办结送达归档, 补正后恢复, 越权跨部门数据拒绝, 共享失败回退, 申诉可反查决定]
    anti_patterns: [用通用OA审批替代法定职责, 官方政策替代项目事项依据, 材料自动复用无授权, 时限只有倒计时]
  - id: PAT-PARTIAL-EXECUTION-CANCEL-001
    name: 部分执行后的取消、停止与替代
    applies_when: 对象可能在未执行部分执行或已产生不可逆结果后被取消停止替代或撤回
    required_questions: [执行进度和结果权威是谁, 已完成与剩余部分分别如何处置, 哪些结果可逆及补偿责任是谁, 替代对象如何引用原对象和防重复执行]
    behavior_contract: [按执行阶段守卫取消权限, 已完成结果保留或逆向处理, 剩余动作阻断, 替代链和下游确认可追溯]
    exception_contract: [执行与取消并发, 下游部分确认, 晚到事件, 补偿失败, 不可逆结果, 多次替代]
    acceptance_blueprints: [未执行取消成功, 部分执行分别处置, 不可逆结果拒绝或转人工, 替代不重复执行, 下游失败可恢复]
    anti_patterns: [只有cancelled一个终态, 取消按钮等于下游已停止, 删除原对象, 让研发猜已执行部分]
  - id: PAT-CROSS-AGGREGATE-FULFILLMENT-001
    name: 订单、库存、履约与支付跨聚合一致性
    applies_when: 一项交易跨订单或申请单库存资源履约交付支付退款等多个权威对象推进
    required_questions: [每个聚合的状态权威和成功定义是什么, 数量金额在何时锁定扣减释放或生效, 并发重复乱序如何守恒, 失败撤销差错和最终对账由谁负责]
    behavior_contract: [聚合各自状态机和关联ID, 命令幂等与版本守卫, 数量金额不变量, 事件确认和对账差错闭环]
    exception_contract: [最后一份资源并发, 支付晚到, 部分履约, 拒收缺货, 退款分摊, 渠道重复回调]
    acceptance_blueprints: [正常全链路一致, 并发只产生一个有效结果, 部分履约数量正确, 支付失败释放资源, 退款和逆向履约对账]
    anti_patterns: [用主单状态代替所有聚合, 跨系统分布式事务口号, 超时即成功或失败, 无差错单和对账责任]
  - id: PAT-CROSS-MODULE-CONVERSION-001
    name: 跨模块对象转换与后继可达
    applies_when: 工单线索需求订单或其他对象会创建转换或沉淀为另一模块的对象
    required_questions: [每一跳由谁触发且源对象如何变化, 目标对象必填字段从哪里来且缺失如何补齐, 重复转换和部分失败如何处理, 新对象由谁从哪个入口继续处理]
    behavior_contract: [逐边动作与状态守卫, 源目标稳定引用和字段映射, 原子事务或补偿对账, 目标对象可检索且后继动作可达]
    exception_contract: [目标必填缺失, 重复转换, 源对象并发变化, 目标创建后无人可见, 下游创建成功但源状态回写失败]
    acceptance_blueprints: [正常转换双向可追溯, 缺字段不产生孤儿对象, 重复请求只产生一个目标, 回写失败进入唯一差错, 有权责任人可继续到终态]
    anti_patterns: [只画首尾箭头, 用名称代替稳定外键, 创建草稿后无下一入口, 让研发猜必填字段, toast成功但领域结果未闭合]
  - id: PAT-LONG-RUNNING-JOB-001
    name: 长耗时任务、进度与可恢复执行
    applies_when: 重建索引转码导入导出批处理生成或其他动作无法在一次同步请求内可靠完成
    required_questions: [任务和业务结果分别以什么为成功, 进度总量阶段和刷新频率如何定义, 取消重试续跑是否安全, 并发重复与部分产物如何处置]
    behavior_contract: [命令幂等键和任务稳定ID, queued/running/succeeded/failed/cancelled状态与守卫, 进度阶段已完成总量和最后心跳, 失败原因重试点产物可见性和责任人]
    exception_contract: [重复启动, 进程重启, 进度停滞, 部分产物, 取消晚到, 依赖限流, 任务版本过期]
    acceptance_blueprints: [正常完成结果可用, 重复请求复用同一业务效果, 中断后从安全点恢复, 取消后不发布残缺产物, 失败显示可操作原因]
    anti_patterns: [只显示转圈, HTTP超时等于任务失败, 重试重复写入, 进度百分比无分母, 后台完成但用户不可达]
  - id: PAT-VERSION-COMPATIBILITY-001
    name: 配置、模板、定义与在途对象版本兼容
    applies_when: 流程配置课程模板字段方案策略或其他定义发布新版本且历史或在途对象仍需使用
    required_questions: [新建历史在途对象各绑定哪个版本, 何时允许迁移或切换, 版本差异影响哪些字段规则结果和证据, 回滚与停用如何处理]
    behavior_contract: [不可变版本快照和稳定引用, 新对象版本选择规则, 在途兼容或显式迁移决策, diff发布回滚停用和消费者通知]
    exception_contract: [版本删除, 在途迁移失败, 新旧字段不兼容, 缓存仍用旧版, 回滚后晚到事件]
    acceptance_blueprints: [新对象使用新版本, 历史结果可按原版解释, 在途按决策继续或迁移, 不兼容迁移被阻断, 回滚保持审计]
    anti_patterns: [直接覆盖配置, 所有历史对象自动切新版, 只保存版本号不保存快照, 回滚删除新版本证据]
  - id: PAT-FEDERATED-RECONCILIATION-001
    name: 多平台同源对象差异核对与按项归并
    applies_when: 两个独立平台都持有同一企业人员车辆资产或资质对象且无法共享一个审核或写入事务
    required_questions: [对象和每类字段的权威方是谁, 如何匹配同一对象, 基本字段与证照项如何比较选择, 一端独有删除冲突和失败如何处理]
    behavior_contract: [稳定匹配键和来源版本, 上报前读取对端最新快照, 按字段或按证照展示差异与默认建议, 用户逐项确认后仅覆盖已选项并记录来源]
    exception_contract: [对端不可用, 同名多对象, 双端并发修改, 一端独有数据, 证照过期或重复, 选择后提交失败]
    acceptance_blueprints: [无差异直接确认, 字段差异按项选择, 证照按证选择, 独有项按规则保留, 并发版本冲突重新核对, 失败不伪报一致]
    anti_patterns: [整对象静默覆盖, 以页面打开时旧快照提交, 名称作为唯一键, 两个平台都声称全局权威, 只显示冲突数量不显示内容]
  - id: PAT-METRIC-CALIBER-001
    name: 指标口径、时点快照与可解释聚合
    applies_when: 页面报告看板导出或验收以数量比率时长金额排名趋势等聚合结果作为判断依据
    required_questions: [统计对象分子分母和去重键是什么, 时间窗口时区截止点和状态过滤是什么, 来源刷新延迟和重算版本是什么, 零值空值小样本和历史回溯如何展示]
    behavior_contract: [稳定METRIC ID和业务定义, 公式维度过滤去重单位精度, 来源血缘刷新时效口径版本, 页面导出接口验收使用同一口径]
    exception_contract: [分母为零, 来源迟到, 跨时区边界, 重复记录, 口径变更, 历史重算, 权限过滤导致聚合变化]
    acceptance_blueprints: [固定样本手工复算一致, 边界时间归属正确, 无权明细不进入结果, 口径版本可见, 页面导出API结果一致]
    anti_patterns: [只列指标名称, 由前端临时计算权威指标, 实时标签但数据有延迟, 修改公式不留版本, 用截图替代可复算样本]
