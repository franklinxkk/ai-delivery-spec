fallback:
  mode: project_domain_capsule
  rule: Missing a dedicated domain pack never blocks generic delivery.
  required_outputs:
    - vocabulary
    - entities
    - state_machines
    - workflows
    - policies
    - source_register
    - unknowns
    - scenario_fixtures
  assertion_policy:
    verified: attributable to an authoritative or accountable source
    inferred: plausible but awaiting owner confirmation
    unknown: missing information changes scope, safety, compliance, data, or acceptance
