schema_version: 5.1.1
generated_from: domain-pack metadata and evaluation evidence
evaluation_index: maintainer/evals/domain-fixtures.yaml
claim_policy:
  rule: Domain assurance has explicit sourced, contract, behavioral, expert and audit levels.
  practice_rule: Production practice proves real delivery use but does not promote reusable-pack maturity.
  contract_tested_requires:
    - sourced knowledge
    - passed deterministic contract evaluation
  behavior_validated_requires:
    - contract-tested maturity
    - passed fresh-agent behavioral evaluation
  expert_reviewed_requires:
    - behavior-validated maturity
    - accountable expert review
    - project-sampled scenarios
  audited_requires:
    - expert-reviewed requirements
    - independent audit evidence
  simulated_review_is_expert_review: false

