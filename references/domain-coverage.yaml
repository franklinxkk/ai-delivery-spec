schema_version: 5.0.0
generated_from: domain-pack metadata and evaluation evidence
evaluation_index: evals/domain-fixtures.yaml
claim_policy:
  rule: A domain file is knowledge coverage, not behavioral validation.
  validated_requires:
    - sourced knowledge
    - passed behavioral evaluation
    - accountable expert review
    - project-sampled scenarios
  audited_requires:
    - validated requirements
    - independent audit evidence
  simulated_review_is_expert_review: false

domains:
  - domain_id: traffic
    name: Traffic Safety and Road Transport SaaS
    knowledge_file: references/domain-traffic.md
    applies_when: [road transport, traffic safety, regulator supervision, transport enterprise]
    does_not_apply_when: [generic workflow with no transport object]
    coverage:
      knowledge: structured
      scenarios: project_sampled
      behavioral_eval: not_run
      expert_review: not_reviewed
    maturity: experimental
    evidence:
      - id: EV-DOM-TRAFFIC-SOURCES
        kind: official_source
        location: references/domain-sources.yaml#KS-TRAFFIC-INSPECTION-2025
        status: current
        owner: domain maintainer
      - id: EV-DOM-TRAFFIC-KNOWLEDGE
        kind: project_sample
        location: examples/traffic-regulatory-change-v5
        status: current
        owner: domain maintainer
    known_gaps:
      - Official source URLs and applicability records are not yet complete.
      - Nine-industry depth has not been behaviorally evaluated.
    last_verified_at: null
    maintainer: ai-delivery-spec maintainers
    production_claim: prohibited

