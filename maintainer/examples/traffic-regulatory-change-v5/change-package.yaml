    - QA 增加状态、提醒、权限和历史记录回归

verification:
  acceptance_refs: [AC-TRAFFIC-QUALIFICATION-2026]
  regression_refs: [AC-TRAFFIC-QUALIFICATION-LEGACY]
  evidence_refs: []
  result: not_run

release:
  rollout: 仅在适用性、客户配置和回归通过后分批激活规则版本
  rollback_trigger: 错误阻断合法从业人员或导致存量档案异常
  owner: 交通产品和运维负责人
