      change_type: verify_only
      reason: 核对字段、提示和来源展示
  actions:
    - ref: ACT-TRAFFIC-QUALIFICATION-RENEW
      change_type: verify_only
      reason: 核对允许状态、责任人和审计
  fields:
    - ref: FLD-TRAFFIC-QUALIFICATION-EXPIRES
      change_type: verify_only
      reason: 核对有效期和提醒口径
  states:
    - ref: STM-TRAFFIC-QUALIFICATION
      change_type: verify_only
      reason: 核对修订后状态与转换
  events:
    - ref: EVT-TRAFFIC-QUALIFICATION-EXPIRED
      change_type: verify_only
      reason: 核对下游提醒和任务影响
  acceptance:
