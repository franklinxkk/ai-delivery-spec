schema_version: 5.1.1
claim_boundary: Passed fixtures prove deterministic domain-contract anchors only. They do not prove fresh-agent behavior, expert correctness, customer acceptance, or production effect.
fixtures:
  - id: FX-TRAFFIC-RISK-CLOSE
    domain: traffic
    type: lifecycle
    source: references/domains/domain-traffic.md
    expected: risk detection, accountable disposition, rectification, evidence, and closure remain traceable
    contract_assertions:
      must_include: [high-risk alert disposition, alert assigned, evidence and audit visible]
    status: passed
  - id: FX-TRAFFIC-AI-BOUNDARY
    domain: traffic
    type: safety
    source: references/domains/domain-traffic.md
    expected: AI advice cannot approve or close an accountable safety decision
    contract_assertions:
      must_include: [driver fatigue recommendation, binding intervention requires human decision]
    status: passed
  - id: FX-CRM-LEAD-REVENUE
    domain: crm
    type: lifecycle
    source: references/domains/domain-crm.md
    expected: lead, opportunity, contract, invoice, and payment retain provenance and permissions
    contract_assertions:
      must_include: [lead to collected revenue, retain source IDs, payment]
    status: passed
  - id: FX-CRM-TICKET-DEMAND
    domain: crm
    type: cross_module
    source: references/domains/domain-crm.md
    expected: ticket-to-demand handoff preserves owner, source, state, event, and acceptance evidence
    contract_assertions:
      must_include: [ticket to demand loop, DemandCreatedFromTicket traceable]
    status: passed
  - id: FX-EDU-COURSE-VERSION
    domain: education-it
    type: lifecycle
    source: references/domains/domain-education-it.md
    expected: learning evidence remains bound to the assigned course and assessment version
    contract_assertions:
      must_include: [training-plan version change, old students keep old version, target grade uses new version]
    status: passed
  - id: FX-EDU-ENTITLEMENT-REVOKE
    domain: education-it
    type: permission
    source: references/domains/domain-education-it.md
    expected: entitlement revocation has an explicit effect on activated learners and retained evidence
    contract_assertions:
      must_include: [course entitlement revocation, new access is blocked by rule, active learning evidence]
    status: passed
  - id: FX-OA-APPROVAL-RECALL
    domain: oa
    type: state_conflict
    source: references/domains/domain-oa.md
    expected: recall, reject, resubmit, and concurrent approval retain an auditable state owner
    contract_assertions:
      must_include: [OA-011, stale approvals are rejected, prior audit remain traceable]
    status: passed
  - id: FX-OA-DOCUMENT-SEAL
    domain: oa
    type: compliance
    source: references/domains/domain-oa.md
    expected: document, signature, seal, archive, and retention authority are not collapsed into one action
    contract_assertions:
      must_include: [Sealed/signed/archived files cannot be silently edited, Correction requires new version, ESignatureRecord]
    status: passed
  - id: FX-MEDICAL-ORDER-CANCEL
    domain: medical-hospital-it
    type: safety
    source: references/domains/domain-medical-hospital-it.md
    expected: clinical cancellation requires accountable authority, downstream impact, and immutable evidence
    contract_assertions:
      must_include: [MED-012, downstream execution or billing impact, immutable audit]
    status: passed
  - id: FX-MEDICAL-PATIENT-MERGE
    domain: medical-hospital-it
    type: data
    source: references/domains/domain-medical-hospital-it.md
    expected: patient identity merge preserves provenance, access, correction, and rollback constraints
    contract_assertions:
      must_include: [MED-011, source provenance, rollback evidence remain traceable]
    status: passed
  - id: FX-DATA-METRIC-VERSION
    domain: data-product
    type: lifecycle
    source: references/domains/domain-data-mart.md
    expected: metric approval, version, lineage, historical recalculation, and consumer impact remain linked
    contract_assertions:
      must_include: [metric definition version change, historical recalculation decision, consumer notification and rollback]
    status: passed
  - id: FX-DATA-AI-EVIDENCE
    domain: data-product
    type: ai_boundary
    source: references/domains/domain-data-mart.md
    expected: generated analysis cites governed data, refuses unsupported scope, and records correction evidence
    contract_assertions:
      must_include: [ChatBI stale data, answer cites freshness or refuses]
    status: passed
  - id: FX-AI-TOOL-DENIAL
    domain: ai-native
    type: permission
    source: references/domains/domain-ai-native.md
    expected: tool denial cannot be bypassed through delegation, memory, or prompt content
    contract_assertions:
      must_include: [delegated tool denial, agent delegation, denial is audited]
    status: passed
  - id: FX-AI-LOOP-FALLBACK
    domain: ai-native
    type: convergence
    source: references/domains/domain-ai-native.md
    expected: repeated propose-reject cycles stop at the configured limit and hand control to a human
    contract_assertions:
      must_include: [repeated propose-reject loop, configured limit, human/manual path]
    status: passed
