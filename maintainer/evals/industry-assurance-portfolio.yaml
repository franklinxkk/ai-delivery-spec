release_acceptance:
  required:
    - seven requirement stages are present and each requires all eight role lenses
    - at least six new high-relevance sectors have distinct requirement physics
    - every scenario exercises a unified PRD, interactive prototype and machine acceptance contract
    - traffic, CRM, education, data-product and AI-native are bridged without maturity promotion
    - runtime goalkeeper makes zero LLM or sub-agent calls and never generates or fixes requirements
    - simulated findings remain fixtures until dated execution evidence is stored separately
